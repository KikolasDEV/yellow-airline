version: "2"
type: frontend
tech_stack:
  - TypeScript
  - React 19
  - Vite
  - React Router
  - React Hook Form
  - Zod
  - Tailwind CSS
  - i18next
  - react-hot-toast
routes:
  - path: /
    file: client/src/pages/Home.tsx
    auth_required: false
    description: Home page that lists flights and lets users filter by origin and destination.
  - path: /vip
    file: client/src/pages/VipZone.tsx
    auth_required: false
    description: VIP registration page with a membership signup form.
  - path: /login
    file: client/src/pages/Login.tsx
    auth_required: false
    description: Login page for existing VIP users.
  - path: /my-bookings
    file: client/src/pages/MyBookings.tsx
    auth_required: true
    description: Logged-in user page that lists their bookings.
features:
  - name: Flight Search And Listing
    description: Users can browse available flights and filter results by origin and destination from the home page.
    files:
      - client/src/pages/Home.tsx
      - client/src/components/FlightCard.tsx
      - client/src/components/FlightSkeleton.tsx
    entry_route: /
    user_interactions:
      - Open the home page.
      - Type an origin in the first search input.
      - Type a destination in the second search input.
      - Wait for loading state to finish.
      - Review the list of returned flight cards or the empty state message.
    api_calls:
      - method: GET
        endpoint: /api/flights?origin={origin}&destination={destination}
    auth_required: false
  - name: VIP Registration
    description: New users can request VIP access by completing the signup form with personal and credential data.
    files:
      - client/src/pages/VipZone.tsx
      - client/src/components/VipForm.tsx
    entry_route: /vip
    user_interactions:
      - Open the VIP page.
      - Fill name, email, passport, and password fields.
      - Submit the VIP registration form.
      - See validation errors for invalid inputs or a success flow that redirects to login.
    api_calls:
      - method: POST
        endpoint: /api/users/register
    auth_required: false
  - name: VIP Login
    description: Existing VIP users can authenticate and store their token in localStorage.
    files:
      - client/src/pages/Login.tsx
      - client/src/components/Navbar.tsx
    entry_route: /login
    user_interactions:
      - Open the login page.
      - Fill email and password.
      - Submit the login form.
      - See an error toast on invalid credentials or navigate to home on success.
    api_calls:
      - method: POST
        endpoint: /api/users/login
    auth_required: false
  - name: Flight Booking
    description: Logged-in users can choose passenger counts and reserve a flight from the home page.
    files:
      - client/src/pages/Home.tsx
      - client/src/components/FlightCard.tsx
      - client/src/components/PassengerSelector.tsx
    entry_route: /
    user_interactions:
      - Open the home page with flights visible.
      - Adjust passenger counts for adults, children, or infants.
      - Click the booking button on a flight card.
      - See a login-required error when unauthenticated or a success/error toast when authenticated.
    api_calls:
      - method: POST
        endpoint: /api/bookings
    auth_required: true
  - name: My Bookings View
    description: Logged-in users can open their bookings page and review previously created reservations.
    files:
      - client/src/pages/MyBookings.tsx
      - client/src/components/Navbar.tsx
    entry_route: /my-bookings
    user_interactions:
      - Login as a VIP user.
      - Open the My Bookings link from the navbar.
      - Wait for the bookings list to load.
      - Review booked flights or the empty state.
    api_calls:
      - method: GET
        endpoint: /api/bookings/my-bookings
    auth_required: true
  - name: Language Toggle
    description: Users can switch the UI language between Spanish and English from the navbar.
    files:
      - client/src/components/Navbar.tsx
      - client/src/i18n.ts
    entry_route: /
    user_interactions:
      - Open any page with the navbar.
      - Click the language toggle button.
      - Confirm translated labels update in the interface.
    api_calls: []
    auth_required: false
known_limitations:
  - issue: Frontend API URLs are hardcoded to http://localhost:5000, so frontend tests depend on the backend being up and seeded.
    location: client/src/pages/Home.tsx
    impact: UI flows that fetch flights, register users, login, or create bookings will fail without the backend.
  - issue: The bookings page requests data even when no token exists and has no route guard.
    location: client/src/pages/MyBookings.tsx
    impact: Unauthenticated access may show an error or inconsistent empty state instead of redirecting to login.
  - issue: Passenger selector only enforces per-field bounds and minimum one adult, not an explicit total-passenger cap across all groups.
    location: client/src/components/PassengerSelector.tsx
    impact: Tests around upper passenger limits may expose invalid combinations that the UI currently allows.
